<!DOCTYPE html>
<html lang="en">
  <head>
    <style>
      div {
        text-align: center;
      }
      img {
        height: 330px;
        margin: 20px 5px;
        object-fit: cover;
        width: 90%;
      }
      .embedded-link {
        width: 80%;
        max-width: 600px;
        height: 100vh;
        border: 2px solid #ccc;
        overflow: hidden;
        margin: auto;
      }

      .embedded-link iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
    </style>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magazine</title>
  </head>
  <body>
    <div>
      <div class="embedded-link">
        <!-- Replace the URL in the 'src' attribute with your actual link -->
        <iframe
          src="https://online.fliphtml5.com/esuf/olac/"
          title="Embedded FlipHTML5"
        ></iframe>
      </div>
    </div>
    <div>
      <img src="20.png" alt="" />
    </div>
    <div>
      <img src="4.png" alt="" />
    </div>
  </body>
</html>
