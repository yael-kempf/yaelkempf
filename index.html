    <meta charset="UTF-8" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        overflow-x: hidden;
        font-size: 125%;
      }

      body {
        font-family: serif;
        text-align: center;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .hidden {
        display: none;
      }

      #futter-cont a {
        display: flex;
        justify-content: flex-start;
      }

      /* Style pour le message de salutation */
      #greeting {
        padding: 1rem;
        font-size: 36px;
        font-style: italic;
        display: none;
      }

      #futter-cont #futterbly {
        margin-top: 1em;
      }

      .newsletter {
        position: absolute;
        top: 0;
        right: 0;
      }

      .hidden-menu {
        position: absolute;
        margin: auto;
        width: 100%;
        max-width: 1200px;
        display: none;
      }

      .hidden-menu .items {
        display: flex;
        flex-direction: column;
        padding: 1rem;
        gap: 0.75rem 0;
        font-size: 2rem;
        font-style: italic;
      }

      .hidden-menu a {
        color: black;
        text-decoration: none;
      }

      .menj {
        display: inline-block;
        position: relative;
        padding: 3px;
      }

      .menj:after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        -webkit-transition: all ease 0.5s;
        -moz-transition: all ease 0.5s;
        transition: all ease 0.5s;
        height: 8px;
        background: rgba(255, 12, 129, 0.83);
        z-index: -99999;
      }

      .menj:hover:after {
        height: 2.5rem;
        background: coral;
      }

      .menj:hover {
        color: #fff;
      }

      @media screen and (max-width: 576px) {
        #futterbly {
          display: none;
        }

        #greeting {
          font-size: 24px;
        }

        .hidden-menu {
          transform: translateY(5rem);
        }

        .hidden-menu .items {
          font-size: 16px;
        }

        .newsletter {
          left: 0;
          right: 0;
          margin: 0 auto;
        }

        .menj:after {
          height: 5px;
        }

        .menj:hover:after {
          height: 24px;
        }
      }

      @media (orientation: landscape) and (hover: none) and (pointer: coarse) {
        #futterbly {
          display: none;
        }
      }

      .mobile-only {
        background-color: #111;
        min-height: 100vh;
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 5px;
        display: none;
      }

      .js-type-writer {
        font-size: 48px;
        font-family: sans-serif;
        color: white;
        text-transform: uppercase;
        text-align: center;
        visibility: hidden;
      }

      .js-type-writer > span {
        border-right: 0.05em solid;
        animation: caret 1s steps(1) infinite;
      }

      @keyframes caret {
        50% {
          border-color: transparent;
        }
      }

      /*WhatsApp-style chatbot*/
      #wa-fab {
        position: fixed;
        bottom: 28px;
        right: 28px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: transparent;
        border: 2.5px solid #eb3681;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        animation: wa-bounce 2s infinite;
        transition: background 0.25s;
      }
      #wa-fab:hover {
        background: #fdebf2;
      }
      #wa-fab svg {
        width: 28px;
        height: 28px;
      }
      #wa-notif {
        position: absolute;
        top: 0px;
        right: 0px;
        width: 13px;
        height: 13px;
        background: #eb3681;
        border-radius: 50%;
        border: 2px solid white;
        animation: wa-pulse 1.8s infinite;
      }
      @keyframes wa-bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }
      @keyframes wa-pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.3);
        }
      }
      #wa-box {
        position: fixed;
        bottom: 100px;
        right: 28px;
        width: 310px;
        max-width: calc(100vw - 32px);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
        z-index: 9998;
        display: none;
        flex-direction: column;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f0ebe3;
      }
      #wa-header {
        background: #eb3681;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      #wa-avatar {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: #fff;
        overflow: hidden;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 16px;
        color: #eb3681;
      }
      #wa-info {
        flex: 1;
      }
      #wa-name {
        color: #fff;
        font-weight: 600;
        font-size: 15px;
        line-height: 1.2;
      }
      #wa-email {
        color: rgba(255, 255, 255, 0.82);
        font-size: 12px;
      }
      #wa-close {
        color: rgba(255, 255, 255, 0.85);
        cursor: pointer;
        font-size: 20px;
        line-height: 1;
        padding: 4px;
        border-radius: 50%;
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
      }
      #wa-close:hover {
        background: rgba(255, 255, 255, 0.2);
      }
      #wa-body {
        padding: 16px 14px 12px;
        min-height: 140px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        background: #f0ebe3;
      }
      .wa-bubble {
        background: #fff;
        border-radius: 0 12px 12px 12px;
        padding: 8px 12px 6px;
        max-width: 88%;
        align-self: flex-start;
        font-size: 14px;
        color: #111;
        line-height: 1.45;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
      }
      .wa-bubble .wa-time {
        font-size: 11px;
        color: #999;
        text-align: right;
        margin-top: 3px;
      }
      .wa-typing-bubble {
        background: #fff;
        border-radius: 0 12px 12px 12px;
        padding: 10px 14px;
        align-self: flex-start;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        display: flex;
        gap: 4px;
        align-items: center;
      }
      .wa-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #bbb;
        animation: wa-dots 1.2s infinite;
      }
      .wa-dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      .wa-dot:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes wa-dots {
        0%,
        60%,
        100% {
          transform: translateY(0);
          background: #bbb;
        }
        30% {
          transform: translateY(-4px);
          background: #888;
        }
      }
      #wa-footer {
        padding: 12px 14px;
        background: #f0ebe3;
        display: flex;
        justify-content: center;
      }
      #wa-start-btn {
        background: #eb3681;
        color: #fff;
        border: none;
        border-radius: 24px;
        padding: 10px 28px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.15s;
      }
      #wa-start-btn:hover {
        background: #d02a6e;
        transform: scale(1.03);
      }
      @media (max-width: 400px) {
        #wa-box {
          right: 8px;
          bottom: 90px;
          width: calc(100vw - 16px);
        }
        #wa-fab {
          bottom: 18px;
          right: 14px;
        }
      }
    </style>

    <script>
      $(document).ready(function () {
        // Show greeting animation only once for an user
        var visited = localStorage.getItem("visited");
        if (visited) {
          $(".hidden-menu").fadeIn();
        } else {
          $("#greeting").show();
          $("#greeting").each(function (index) {
            var characters = $(this).text().split("");
            $this = $(this);
            $this.empty();
            $.each(characters, function (i, el) {
              if (el == " ") {
                el = "&nbsp;";
              }
              $this.append('<span class="letter-' + i + '">' + el + "</span>");
            });
          });
          setTimeout(() => {
            $(".hidden-menu").fadeIn();
            $("#greeting").fadeOut();
          }, 15000);
          localStorage.setItem("visited", true);
        }
      });
    </script>

    <script>
      function updateGreeting() {
        const currentHour = new Date().getHours();
        const europeanHour =
          currentHour === 0
            ? "midnight"
            : currentHour > 12
              ? currentHour - 12
              : currentHour;
        const previousEuropeanHour =
          currentHour === 0
            ? 11
            : currentHour - 1 === 0
              ? 11
              : currentHour - 1 > 12
                ? currentHour - 1 - 12
                : currentHour - 1;
        const timeOfDay =
          currentHour < 12
            ? "morning"
            : currentHour < 18
              ? "afternoon"
              : "evening";
        const greetingSentence = `I knew you would arrive around ${europeanHour === "midnight" ? "midnight my dear Cinderella. However, I was already happy by 11." : `${europeanHour} in the ${timeOfDay}, I was already happy by ${previousEuropeanHour}.`}`;

        document.getElementById("greeting").textContent = greetingSentence;
      }

      updateGreeting(); // Initial update

      // Update the greeting every minute
      setInterval(updateGreeting, 60000);

      $(document).ready(function () {
        setTimeout(function () {
          $("#futter-cont").css("visibility", "");
        }, 500);
      });
    </script>

    <script>
      window.addEventListener("load", function () {
        const typeWriter = (selector) => {
          const el = document.querySelector(selector);
          el.style.visibility = "visible";
          const text = el.innerHTML;

          (function _type(i = 0) {
            if (i === text.length) return;

            el.innerHTML =
              text.substring(0, i + 1) + '<span aria-hidden="true"></span>';
            setTimeout(() => _type(i + 1), 100);
          })();
        };
        typeWriter(".js-type-writer");
      });
    </script>

  <script>
    let _waOpened = false;
    let _waAnimated = false;

    function toggleChat() {
      const box = document.getElementById("wa-box");
      if (!_waOpened) {
        box.style.display = "flex";
        _waOpened = true;
        document.getElementById("wa-notif").style.display = "none";
        if (!_waAnimated) {
          _waAnimated = true;
          _waRunAnimation();
        }
      } else {
        closeChat();
      }
    }

    function closeChat() {
      document.getElementById("wa-box").style.display = "none";
      _waOpened = false;
    }

    function _waRunAnimation() {
      const body = document.getElementById("wa-body");
      body.innerHTML = "";
      const typing = document.createElement("div");
      typing.className = "wa-typing-bubble";
      typing.innerHTML =
        '<div class="wa-dot"></div><div class="wa-dot"></div><div class="wa-dot"></div>';
      body.appendChild(typing);
      setTimeout(() => {
        body.removeChild(typing);
        const msg = document.createElement("div");
        msg.className = "wa-bubble";
        msg.innerHTML =
          'Hi Honey,<br>I have something to <a href="https://artviewer.org/yael-kempf-at-kunsthaus-essen/" target="_blank">announce</a>...<br>Kiss kiss 💋<div class="wa-time">now</div>';
        body.appendChild(msg);
      }, 2200);
    }

    function startChat() {
      window.open("https://wa.me/33764565969", "_blank");
    }
  </script>
