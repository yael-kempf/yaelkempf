    .menj {
      display: inline-block;
      position: relative;
      padding: 3px;
    }

    .menj:after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      -webkit-transition: all ease 0.5s;
      -moz-transition: all ease 0.5s;
      transition: all ease 0.5s;
      height: 8px;
      background: rgba(255, 12, 129, 0.83);
      z-index: -99999;
    }

    .menj:hover:after {
      height: 2.5rem;
      background: coral;
    }

    .menj:hover {
      color: #FFF;
    }

    @media screen and (max-width :576px) {

      #futterbly {
        display: none;
      }

      #greeting {
        font-size: 24px;
      }

      .hidden-menu {
        transform: translateY(5rem);
      }

      .hidden-menu .items {
        font-size: 16px;
      }

      .newsletter {
        left: 0;
        right: 0;
        margin: 0 auto;
      }

      .menj:after {
        height: 5px;
      }

      .menj:hover:after {
        height: 24px;
      }
    }

    @media (orientation: landscape) and (hover: none) and (pointer: coarse) {
      #futterbly {
        display: none;
      }
    }


    .mobile-only {
      background-color: #111;
      min-height: 100vh;

    .js-type-writer {

    }

    .js-type-writer>span {
      border-right: .05em solid;
      animation: caret 1s steps(1) infinite;
    }

    @keyframes caret {
      50% {
        border-color: transparent;
      }
    }

  <script>
    $(document).ready(function () {
      // Show greeting animation only once for an user
      var visited = localStorage.getItem('visited');
      if (visited) {
        $('.hidden-menu').fadeIn();
      } else {
        $('#greeting').show();
        $('#greeting').each(function (index) {
          var characters = $(this).text().split("");
          $this = $(this);
          $this.empty();
          $.each(characters, function (i, el) {
            if (el == " ") {
              el = "&nbsp;"
            }
            $this.append('<span class="letter-' + i + '">' + el + '</span>');
          });
        });
        setTimeout(() => {
          $('.hidden-menu').fadeIn();
          $('#greeting').fadeOut();
        }, 15000);
        localStorage.setItem('visited', true);
      }
    });

  </script>

  <script>
    function updateGreeting() {
      const currentHour = new Date().getHours();
      const europeanHour = currentHour === 0 ? "midnight" : currentHour > 12 ? currentHour - 12 : currentHour;
      const previousEuropeanHour = currentHour === 0 ? 11 : currentHour - 1 === 0 ? 11 : currentHour - 1 > 12 ? currentHour - 1 - 12 : currentHour - 1;
      const timeOfDay = currentHour < 12 ? "morning" : currentHour < 18 ? "afternoon" : "evening";
      const greetingSentence = `I knew you would arrive around ${europeanHour === "midnight" ? "midnight my dear Cinderella. However, I was already happy by 11." : `${europeanHour} in the ${timeOfDay}, I was already happy by ${previousEuropeanHour}.`}`;

      document.getElementById('greeting').textContent = greetingSentence;
    }

    updateGreeting(); // Initial update

    // Update the greeting every minute
    setInterval(updateGreeting, 60000);


    $(document).ready(function () {
      setTimeout(function () {
        $('#futter-cont').css('visibility', '');
      }, 500);
    });
  </script>


  <script>
    window.addEventListener('load', function () {

      const typeWriter = selector => {
        const el = document.querySelector(selector)
        el.style.visibility = "visible"
        const text = el.innerHTML

          ; (function _type(i = 0) {
            if (i === text.length) return

            el.innerHTML =
              text.substring(0, i + 1) + '<span aria-hidden="true"></span>'
            setTimeout(() => _type(i + 1), 100)
          })()
      }
      typeWriter(".js-type-writer")

    })

  </script>
