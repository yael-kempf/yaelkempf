<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Gnothi Seauton</title>
  <meta name="description" content="Gnothi Seauton — a multimedia project about self-knowledge, domestic space, and tactile exploration." />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
    integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous" />

  <link href="../css/styles.css?v=1" rel="stylesheet" />

  <link href="../css/work.css?v=1" rel="stylesheet" />
  <link rel="preload" href="../fonts/EBGaramond-Regular.ttf" as="font" type="font/ttf" />
  <link rel="preload" href="../fonts/TheBrownWall.ttf" as="font" type="font/ttf" />

  <style>
    *,
    *::after,
    *::before {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    @font-face {
      font-family: "EBGaramond-Regular";
      src: url(../fonts/EBGaramond-Regular.ttf);
    }

    @font-face {
      font-family: "TheBrownWall";
      src: url(../fonts/TheBrownWall.ttf);
    }

    body {
      font-family: serif;
    }

    .site-wrapper {
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      background-image: url(../images/gnothiseauton/background3.webp);
      background-repeat: no-repeat;
      background-size: cover;
    }

    /*rotate device mobile*/

    .rotate-container {
      width: 100%;
      min-height: 100vh;
      background-color: black;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      display: none;
    }

    .phone {
      height: 50px;
      width: 100px;
      border: 3px solid white;
      border-radius: 10px;
      animation: rotate 1.5s ease-in-out infinite alternate;
      display: none;
    }

    .message {
      color: white;
      font-size: 1.5em;
      margin-top: 40px;
      display: none;
      text-align: center;
      padding: 1rem;
    }

    @keyframes rotate {
      0% {
        transform: rotate(0deg);
      }

      50% {
        transform: rotate(-90deg);
      }

      100% {
        transform: rotate(-90deg);
      }
    }

    .main-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 100vh;
      /* background-image: url(../mywork/projects/gnothiseauton/new/background3.jpg);
        background-repeat: no-repeat;
        background-size: cover; */
    }

    .main-text {
      margin-top: 5rem;
    }

    /* CURSOR HOVER EFFECT */

    .cursor {
      position: absolute;
      width: 500px;
      height: 300px;
      top: 50%;
      left: 50%;
      /* margin: -100px 0 0 -100px; */
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      z-index: 1;
    }

    .project-list {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .project {
      position: relative;
      z-index: 2;
      color: rgb(200, 200, 200);
      mix-blend-mode: difference;
      cursor: pointer;
      font-family: serif;
      text-align: center;
    }

    .project p {
      font-size: 4rem;
      line-height: 1.25;
      margin: 0;
    }

    .project-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* END CURSOR HOVER EFFECT */

    /* MOBILE SLIDER  */

    .mobile-slider {
      height: 100vh;
      width: 100%;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 3;
      display: none;
    }

    .mobile-slider img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
      display: none;
    }

    /* END MOBILE SLIDER  */

    /* FADE IN TEXT */
    .fade-in-text {
      animation: fadeIn 5s;
      -webkit-animation: fadeIn 5s;
      -moz-animation: fadeIn 5s;
      -o-animation: fadeIn 5s;
      -ms-animation: fadeIn 5s;
      font-family: "TheBrownWall";

    }

    @keyframes fadeIn {
      0% {
        opacity: 0;
      }

      100% {
        opacity: 1;
      }
    }

    @-moz-keyframes fadeIn {
      0% {
        opacity: 0;
      }

      100% {
        opacity: 1;
      }
    }

    @-webkit-keyframes fadeIn {
      0% {
        opacity: 0;
      }

      100% {
        opacity: 1;
      }
    }

    @-o-keyframes fadeIn {
      0% {
        opacity: 0;
      }

      100% {
        opacity: 1;
      }
    }

    @-ms-keyframes fadeIn {
      0% {
        opacity: 0;
      }

      100% {
        opacity: 1;
      }
    }

    /* FADE IN TEXT END */

    /* SECONDARY TEXT */

    .secondary-text {
      position: absolute;
      left: 100%;
      top: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      display: none;
      background-image: linear-gradient(0deg,
          rgba(0, 0, 0, 0.3),
          rgba(0, 0, 0, 0.3)),
        url(../images/gnothiseauton/background2.webp);
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      cursor: grab;
    }

    .secondary-text p {
      margin: 0;
      font-size: 4rem;
      line-height: 1.25;
      text-align: center;
      font-family: serif;
      color: white;
      cursor: pointer;
    }

    .secondary-text-open {
      display: flex;
    }

    /* SECONDARY TEXT END */

    /* MODAL VIDEO STARTS */
    .modalVideo {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      background-color: rgba(0, 0, 0, 0.8);
      z-index: 10;
    }

    .modalVideo video {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate3d(-50%, -50%, 0);
      display: block;
      object-fit: cover;
    }

    .modalVideo .modal-close {
      cursor: pointer;
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 5px;
      color: #444;
      background-color: #fff;
      font-family: serif;
      font-weight: bold;
    }

    .is-hide {
      display: none;
    }

    /* MODAL VIDEO ENDS */

    #preload {
      display: none;
    }

    header {
      position: absolute;
      top: 0;
      left: 0;
    }

    @media screen and (max-width: 1200px) {

      .project p,
      .secondary-text p {
        font-size: 3rem;
        line-height: 1.25;
      }
    }

    @media screen and (max-width: 768px) and (orientation: portrait) {

      .phone,
      .message {
        display: block;
      }

      .rotate-container {
        display: flex;
      }

      .main-container,
      .secondary-text {
        display: none;
      }

      header {
        display: block !important;
      }
    }

    @media screen and (max-width: 768px),
    (min-width: 600px) and (orientation: landscape) and (hover: none) and (pointer: coarse) {

      .project p,
      .secondary-text p {
        font-size: 2rem;
        line-height: 1.25;
      }

      .cursor,
      header {
        display: none;
      }

      .modalVideo video {
        width: 100%;
        height: 100%;
      }
    }
  </style>
</head>

    <header>
      <a class="link_left" href="../bonus/index.html"><img class="star-menu-icon" src="../logo/spinningstar.svg" alt="Spinning star — home" loading="lazy" /></a>
    </header>

    <div id="preload">
      <img src="../images/gnothiseauton/background2.webp" alt="Gnothi Seauton background preview" loading="lazy" />
    </div>

    <div class="rotate-container">
      <div class="phone"></div>
      <div class="message">
        <p>Dear visitor, would you be so kind to rotate your phone?</p>
      </div>
    </div>
    <div class="mobile-slider">
      <img src="../images/gnothiseauton/1-mobile.webp" alt="Gnothi Seauton image 1" loading="lazy" />
      <img src="../images/gnothiseauton/2.webp" alt="Gnothi Seauton image 2" loading="lazy" />
      <img src="../images/gnothiseauton/3-mobile.webp" alt="Gnothi Seauton image 3" loading="lazy" />
      <img src="../images/gnothiseauton/4.webp" alt="Gnothi Seauton image 4" loading="lazy" />
    </div>

    <main class="main-container">
      <div class="main-text">
        <div class="cursor"></div>

        <div class="project-list">
          <div class="project project-1">
            <div class="project-title">
              <p class="fade-in-text">The house is a temple.</p>

          <div class="project project-2">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
    integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
    crossorigin="anonymous"></script>
  <!-- gsap -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.10.4/gsap.min.js"

  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"
    integrity="sha512-0bEtK0USNd96MnO4XhH8jhv3nyRF0eK87pJke6pkYf3cM0uDIhNJy9ltuzqgypoIFXw3JSuiy04tVk4AjpZdZw=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script>
    // CURSOR HOVER EFFECT

    const deviceType = () => {
      const ua = navigator.userAgent;
      if (/(tablet|ipad|playbook|silk)|(android(?!.*mobi))/i.test(ua)) {
        return "tablet";
      } else if (
        /Mobile|Android|iP(hone|od)|IEMobile|BlackBerry|Kindle|Silk-Accelerated|(hpw|web)OS|Opera M(obi|ini)/.test(
          ua
        )
      ) {
        return "mobile";
      }
      return "desktop";
    };

    let device = deviceType();

    if (device != "mobile") {
      var $cursor = $(".cursor"),
        $overlay = $(".project-overlay");

      function moveCircle(e) {
        if ($(this).parent().hasClass("project-1")) {
          TweenLite.to($cursor, 0.5, {
            css: {
              left: e.pageX - 800,
              top: e.pageY - 400,
            },
            delay: 0.03,
          });
        } else if ($(this).parent().hasClass("project-2")) {
          TweenLite.to($cursor, 0.5, {
            css: {
              left: e.pageX + 100,
              top: e.pageY - 500,
            },
            delay: 0.03,
          });
        } else if ($(this).parent().hasClass("project-3")) {
          TweenLite.to($cursor, 0.5, {
            css: {
              left: e.pageX - 600,
              top: e.pageY,
            },
            delay: 0.03,
          });
        } else if ($(this).parent().hasClass("project-4")) {
          TweenLite.to($cursor, 0.5, {
            css: {
              left: e.pageX + 100,
              top: e.pageY,
            },
            delay: 0.03,
          });
        }
      }

      $(".project-1").hover(function () {
        $(".cursor").css({
          "background-image":
            "url(../images/gnothiseauton/1.webp)",
        });
      });

      $(".project-2").hover(function () {
        $(".cursor").css({
          "background-image":
            "url(../images/gnothiseauton/2.webp)",
        });
      });
      $(".project-3").hover(function () {
        $(".cursor").css({
          "background-image":
            "url(../images/gnothiseauton/3.webp)",
        });
      });
      $(".project-4").hover(function () {
        $(".cursor").css({
          "background-image":
            "url(../images/gnothiseauton/4.webp)",
        });
      });

      var flag = false;
      $($overlay).mousemove(function () {
        flag = true;
        TweenLite.to($cursor, 0.3, { scale: 1, autoAlpha: 1 });
        $($overlay).on("mousemove", moveCircle);
      });

      $($overlay).mouseout(function () {
        flag = false;
        TweenLite.to($cursor, 0.3, { scale: 0.1, autoAlpha: 0 });
      });
    }

    // TOUCH SLIDER

    if (device === "mobile") {
      window.oncontextmenu = function (event) {
        event.preventDefault();
        event.stopPropagation();
        return false;
      };
      let mobileSlider = document.querySelector(".mobile-slider");
      let mobileSliderImg = document.querySelectorAll(".mobile-slider img");
      function slider() {
        if (!$(".secondary-text").hasClass("secondary-text-open")) {
          mobileSlider.style.display = "initial";
          for (let i = 0; i < mobileSliderImg.length; i++) {
            let myTimeout = setTimeout(
              function (j) {
                mobileSliderImg[j].style.display = "initial";
              },
              i * 1000,
              i
            );

            document.body.addEventListener("touchend", () => {
              mobileSlider.style.display = "none";
              for (let x = 0; x < mobileSliderImg.length; x++) {
                mobileSliderImg[x].style.display = "none";
              }

              clearTimeout(myTimeout);
            });

            window.addEventListener("scroll", function () {
              mobileSlider.style.display = "none";
              for (let x = 0; x < mobileSliderImg.length; x++) {
                mobileSliderImg[x].style.display = "none";
              }

              clearTimeout(myTimeout);
            });
          }
        }
      }

      document.body.addEventListener("touchstart", () => {
        let myTimeout2 = setTimeout(function () {
          slider();
        }, 300);
        document.body.addEventListener("touchend", () => {
          mobileSlider.style.display = "none";
          for (let x = 0; x < mobileSliderImg.length; x++) {
            mobileSliderImg[x].style.display = "none";
          }

          clearTimeout(myTimeout2);
        });
      });
    }

    //MODAL VIDEO

    $(function () {
      var $modal = $("#firstVid");
      var HIDE_CLASS = "is-hide";
      let modalVideo = $("#firstVid video");
      $(".secondary-text").on("click", function () {
        $modal.removeClass(HIDE_CLASS);
        modalVideo.trigger("play");
      });

      $("#firstVid .js-modal-close").on("click", function () {
        $modal.addClass(HIDE_CLASS);
        modalVideo.trigger("pause");
        modalVideo.get(0).load();
      });
    });

    //OPEN SLIDE AND SLIDE TO BACK

    $(".project").on("click", function () {
      $(".main-container").fadeOut();

      $(".secondary-text").addClass("secondary-text-open").animate(
        {
          left: "0",
        },
        1000
      );
    });

    function closeModal(callback) {
      modalOpen = false;
      $(".secondary-text-open").animate(
        {
          left: "100%",
        },
        1000,
        "swing",
        function () {
          $(this).removeClass("secondary-text-open");
          if (typeof callback === "function") {
            callback();
          }
        }
      );
    }

    $("#draggable").draggable({
      axis: "x",
      start: function (event, ui) {
        startPosition = ui.position.left;
      },
      drag: function (event, ui) {
        if (ui.position.left < startPosition) {
          ui.position.left = startPosition;
        }

        startPosition = ui.position.left;
      },

      stop: function () {
        closeModal();
        $(".main-container").css("display", "flex").hide().fadeIn();
      },
    });
  </script>
  <grammarly-desktop-integration data-grammarly-shadow-root="true"></grammarly-desktop-integration>
